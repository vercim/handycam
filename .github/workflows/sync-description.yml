name: Sync Description

on:
  push:
    branches: [main]
    paths:
      - 'docs/DESCRIPTION.md'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Modrinth project description
        run: |
          jq -Rs '{"body": .}' docs/DESCRIPTION.md | \
          curl -sf -X PATCH \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.modrinth.com/v2/project/handycam"
          echo "Modrinth description updated."
