name: Publish

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'new_release — tag + GitHub + all platforms | add_mc_version — add to existing release | curseforge_publish — only CurseForge | modrinth_publish — only Modrinth'
        required: true
        default: 'new_release'
        type: choice
        options:
          - new_release
          - add_mc_version
          - curseforge_publish
          - modrinth_publish

env:
  RELEASE_TYPE: release   # beta | release | alpha — applies to GitHub, Modrinth, CurseForge

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Parse versions from gradle.properties
        id: vars
        run: |
          MC_VERSION=$(grep '^minecraft_version' gradle.properties | sed 's/minecraft_version *= *//')
          MOD_VERSION=$(grep '^mod_version'       gradle.properties | sed 's/mod_version *= *//')
          PLATFORMS=$(grep  '^enabled_platforms'  gradle.properties | sed 's/enabled_platforms *= *//' | tr -d ' ')

          echo "mod_version=$MOD_VERSION"  >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION"    >> $GITHUB_OUTPUT
          echo "release_tag=v$MOD_VERSION" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS"      >> $GITHUB_OUTPUT
          echo "Mod: $MOD_VERSION | MC: $MC_VERSION | Platforms: $PLATFORMS"

      # ── Валидация ─────────────────────────────────────────────────────────────
      - name: Validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOD_VERSION="${{ steps.vars.outputs.mod_version }}"
          RELEASE_TAG="${{ steps.vars.outputs.release_tag }}"
          ACTION="${{ github.event.inputs.action }}"

          ERRORS=0

          # 1. Changelog must have an entry for this version
          if ! grep -q "## \[$MOD_VERSION\]" CHANGELOG.md; then
            echo "::error::No changelog entry for $MOD_VERSION in CHANGELOG.md"
            echo "  → Add a '## [$MOD_VERSION]' section before publishing."
            ERRORS=$((ERRORS + 1))
          fi

          # 2. Release existence check depends on mode
          RELEASE_EXISTS=false
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            RELEASE_EXISTS=true
          fi

          if [ "$ACTION" = "new_release" ] && [ "$RELEASE_EXISTS" = "true" ]; then
            echo "::error::Release $RELEASE_TAG already exists."
            echo "  → Did you forget to bump mod_version in gradle.properties?"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ACTION" = "add_mc_version" ] && [ "$RELEASE_EXISTS" = "false" ]; then
            echo "::error::Release $RELEASE_TAG does not exist yet."
            echo "  → Run the workflow on the main branch with 'new_release' first."
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS validation error(s). Fix the issues above and re-run."
            exit 1
          fi

          echo "All checks passed."

      - name: Read changelog
        id: changelog
        run: |
          VERSION="${{ steps.vars.outputs.mod_version }}"
          CONTENT=$(sed -n "/^## \\[$VERSION\\]/,/^## \\[/{/^## \\[/!p}" CHANGELOG.md)
          if [ -z "$CONTENT" ]; then
            CONTENT=$(cat CHANGELOG.md)
          fi
          {
            echo 'content<<CHANGELOG_EOF'
            printf '%s\n' "$CONTENT"
            echo 'CHANGELOG_EOF'
          } >> $GITHUB_OUTPUT

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Validate build output
        run: |
          MOD_VERSION="${{ steps.vars.outputs.mod_version }}"
          MC_VERSION="${{ steps.vars.outputs.mc_version }}"
          PLATFORMS="${{ steps.vars.outputs.platforms }}"

          ERRORS=0
          for LOADER in $(echo "$PLATFORMS" | tr ',' ' '); do
            JAR="${LOADER}/build/libs/handycam-${MOD_VERSION}-${LOADER}-${MC_VERSION}.jar"
            if [ ! -f "$JAR" ]; then
              echo "::error::Expected JAR not found: $JAR"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $JAR"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi

      # ── Создать тег и GitHub Release (только new_release) ────────────────────
      - name: Create tag and GitHub release
        if: github.event.inputs.action == 'new_release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          MOD_VERSION="${{ steps.vars.outputs.mod_version }}"
          RELEASE_TAG="${{ steps.vars.outputs.release_tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

          PRERELEASE_FLAG=""
          if [ "$RELEASE_TYPE" != "release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "Handycam $MOD_VERSION" \
            --notes "$CHANGELOG" \
            $PRERELEASE_FLAG
          echo "Created release $RELEASE_TAG"

      # ── Загрузить файлы в GitHub Release ─────────────────────────────────────
      - name: Upload to GitHub release
        if: github.event.inputs.action == 'new_release' || github.event.inputs.action == 'add_mc_version'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOD_VERSION="${{ steps.vars.outputs.mod_version }}"
          MC_VERSION="${{ steps.vars.outputs.mc_version }}"
          RELEASE_TAG="${{ steps.vars.outputs.release_tag }}"
          PLATFORMS="${{ steps.vars.outputs.platforms }}"

          JARS=()
          for LOADER in $(echo "$PLATFORMS" | tr ',' ' '); do
            JARS+=("${LOADER}/build/libs/handycam-${MOD_VERSION}-${LOADER}-${MC_VERSION}.jar")
          done

          gh release upload "$RELEASE_TAG" "${JARS[@]}" --clobber
          echo "GitHub: uploaded ${#JARS[@]} files to $RELEASE_TAG"

      # ── CurseForge: все лоадеры в цикле ─────────────────────────────────────
      - name: Publish to CurseForge
        if: github.event.inputs.action != 'modrinth_publish'
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          MOD_VERSION="${{ steps.vars.outputs.mod_version }}"
          MC_VERSION="${{ steps.vars.outputs.mc_version }}"
          PLATFORMS="${{ steps.vars.outputs.platforms }}"
          PROJECT_ID="1588734"

          VERSION_TYPES=$(curl -s -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            "https://minecraft.curseforge.com/api/game/version-types")
          GAME_VERSIONS=$(curl -s -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            "https://minecraft.curseforge.com/api/game/versions")

          # MC versions: typeID 1 confirmed working in previous runs
          MC_VERSION_ID=$(echo "$GAME_VERSIONS" | jq --arg v "$MC_VERSION" \
            '[.[] | select(.gameVersionTypeID == 1 and .name == $v)] | .[0].id')

          if [ "$MC_VERSION_ID" = "null" ] || [ -z "$MC_VERSION_ID" ]; then
            echo "::error::Could not find CurseForge game version ID for MC $MC_VERSION"
            exit 1
          fi

          MODLOADER_TYPE_ID=$(echo "$VERSION_TYPES" | jq '[.[] | select(.slug == "modloader")] | .[0].id')

          for LOADER in $(echo "$PLATFORMS" | tr ',' ' '); do
            JAR="${LOADER}/build/libs/handycam-${MOD_VERSION}-${LOADER}-${MC_VERSION}.jar"

            case "$LOADER" in
              fabric)
                LOADER_CF_NAME="Fabric"
                DISPLAY="Fabric"
                DEPS='{"projects":[
                  {"slug":"fabric-api",  "type":"requiredDependency"},
                  {"slug":"cloth-config","type":"requiredDependency"},
                  {"slug":"modmenu",     "type":"optionalDependency"}
                ]}'
                ;;
              neoforge)
                LOADER_CF_NAME="NeoForge"
                DISPLAY="NeoForge"
                DEPS='{"projects":[
                  {"slug":"cloth-config","type":"requiredDependency"}
                ]}'
                ;;
              forge)
                LOADER_CF_NAME="Forge"
                DISPLAY="Forge"
                DEPS='{"projects":[
                  {"slug":"cloth-config","type":"requiredDependency"}
                ]}'
                ;;
              *)
                LOADER_CF_NAME=""
                DISPLAY="$LOADER"
                DEPS='{"projects":[]}'
                ;;
            esac

            GV_ARRAY="[$MC_VERSION_ID]"
            if [ -n "$LOADER_CF_NAME" ] && [ "$MODLOADER_TYPE_ID" != "null" ]; then
              LOADER_VERSION_ID=$(echo "$GAME_VERSIONS" | jq --argjson tid "$MODLOADER_TYPE_ID" --arg name "$LOADER_CF_NAME" \
                '[.[] | select(.gameVersionTypeID == $tid and .name == $name)] | .[0].id')
              if [ "$LOADER_VERSION_ID" != "null" ] && [ -n "$LOADER_VERSION_ID" ]; then
                GV_ARRAY=$(echo "$GV_ARRAY" | jq ". + [$LOADER_VERSION_ID]")
              fi
            fi

            jq -n \
              --arg name         "Handycam ${MOD_VERSION} ${DISPLAY}" \
              --arg log          "$CHANGELOG" \
              --arg release_type "$RELEASE_TYPE" \
              --argjson gv       "$GV_ARRAY" \
              --argjson deps     "$DEPS" \
              '{
                changelog:     $log,
                changelogType: "markdown",
                displayName:   $name,
                gameVersions:  $gv,
                releaseType:   $release_type,
                relations:     $deps
              }' > /tmp/curseforge_data.json

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "X-Api-Token: $CURSEFORGE_TOKEN" \
              -F "metadata=</tmp/curseforge_data.json;type=application/json" \
              -F "file=@$JAR" \
              "https://minecraft.curseforge.com/api/projects/${PROJECT_ID}/upload-file")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::CurseForge API error $HTTP_CODE: $BODY"
              exit 1
            fi
            echo "CurseForge: $DISPLAY $MC_VERSION published (file ID: $(echo "$BODY" | jq -r '.id'))"
          done

      # ── Modrinth: все лоадеры в цикле ────────────────────────────────────────
      - name: Publish to Modrinth
        if: github.event.inputs.action != 'curseforge_publish'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          MOD_VERSION="${{ steps.vars.outputs.mod_version }}"
          MC_VERSION="${{ steps.vars.outputs.mc_version }}"
          PLATFORMS="${{ steps.vars.outputs.platforms }}"

          # Fetch actual project ID (not slug) — create version API requires the real ID
          PROJECT_ID=$(curl -s "https://api.modrinth.com/v2/project/handycam" | jq -r '.id')
          echo "Project ID: $PROJECT_ID"

          for LOADER in $(echo "$PLATFORMS" | tr ',' ' '); do
            JAR="${LOADER}/build/libs/handycam-${MOD_VERSION}-${LOADER}-${MC_VERSION}.jar"

            case "$LOADER" in
              fabric)
                DISPLAY="Fabric"
                DEPS='[
                  {"project_id": "P7dR8mSH", "dependency_type": "required"},
                  {"project_id": "9s6osm5g", "dependency_type": "required"},
                  {"project_id": "mOgUt4GM", "dependency_type": "optional"}
                ]'
                ;;
              neoforge)
                DISPLAY="NeoForge"
                DEPS='[{"project_id": "9s6osm5g", "dependency_type": "required"}]'
                ;;
              forge)
                DISPLAY="Forge"
                DEPS='[{"project_id": "9s6osm5g", "dependency_type": "required"}]'
                ;;
              *)
                DISPLAY="$LOADER"
                DEPS='[]'
                ;;
            esac

            # Write JSON to temp file to avoid shell quoting issues with multiline content
            jq -n \
              --arg name         "Handycam ${MOD_VERSION} ${DISPLAY}" \
              --arg ver          "${MOD_VERSION}+${MC_VERSION}" \
              --arg mc           "$MC_VERSION" \
              --arg log          "$CHANGELOG" \
              --arg loader       "$LOADER" \
              --arg pid          "$PROJECT_ID" \
              --arg release_type "$RELEASE_TYPE" \
              --argjson deps     "$DEPS" \
              '{
                name:           $name,
                version_number: $ver,
                changelog:      $log,
                dependencies:   $deps,
                game_versions:  [$mc],
                version_type:   $release_type,
                loaders:        [$loader],
                featured:       true,
                project_id:     $pid,
                file_parts:     ["file"],
                primary_file:   "file"
              }' > /tmp/modrinth_data.json
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: $MODRINTH_TOKEN" \
              -F "data=</tmp/modrinth_data.json;type=application/json" \
              -F "file=@$JAR" \
              "https://api.modrinth.com/v2/version")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::Modrinth API error $HTTP_CODE: $BODY"
              exit 1
            fi
            echo "Modrinth: $DISPLAY $MC_VERSION published"
          done
